<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">AI Architecture Stack</title>
  <desc id="desc">A seven-layer AI architecture diagram from physical foundation to application experience.</desc>
  <style>
    .title{font:700 52px Arial, sans-serif;fill:#0f172a}.subtitle{font:24px Arial,sans-serif;fill:#475569}.layerTitle{font:700 25px Arial,sans-serif;fill:#0f172a}.small{font:17px Arial,sans-serif;fill:#334155}.num{font:700 34px Arial,sans-serif;fill:white}.boxText{font:17px Arial,sans-serif;fill:#0f172a}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:2}.layer{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.arrow{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}.rail{stroke:#64748b;stroke-width:3;fill:none}.footer{fill:#f8fafc;stroke:#94a3b8;stroke-width:2}.icon{font:28px Arial,sans-serif;fill:#0f172a}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker></defs>
  <rect width="1200" height="1500" fill="white"/>
  <text x="600" y="80" text-anchor="middle" class="title">AI ARCHITECTURE STACK</text>
  <text x="600" y="120" text-anchor="middle" class="subtitle">An OSI-inspired layered framework for modern AI systems</text>
  <path d="M65 210 V1240" class="rail"/>
  <g transform="translate(100,170)">
    <g transform="translate(0,0)"><rect x="0" y="20" width="70" height="70" rx="12" fill="#1d4ed8"/><text x="35" y="66" text-anchor="middle" class="num">7</text><rect x="100" y="0" width="380" height="110" rx="14" class="layer"/><text x="130" y="45" class="icon">◎</text><text x="190" y="43" class="layerTitle">Application &amp; Experience</text><text x="190" y="75" class="small">User value, interface, feedback and integration</text><path d="M480 55 H545" class="arrow"/><rect x="560" y="0" width="450" height="110" rx="14" class="box"/><text x="585" y="40" class="boxText">UI/UX • citations • software integration • use cases</text><text x="585" y="75" class="boxText">Adoption, workflow fit and measurable value</text></g>
    <g transform="translate(0,160)"><rect x="0" y="20" width="70" height="70" rx="12" fill="#0891b2"/><text x="35" y="66" text-anchor="middle" class="num">6</text><rect x="100" y="0" width="380" height="110" rx="14" class="layer"/><text x="130" y="45" class="icon">⇄</text><text x="190" y="43" class="layerTitle">Orchestration &amp; Agents</text><text x="190" y="75" class="small">Workflow logic, tools and multi-step execution</text><path d="M480 55 H545" class="arrow"/><rect x="560" y="0" width="450" height="110" rx="14" class="box"/><text x="585" y="40" class="boxText">Planning • task decomposition • tool use • review loops</text><text x="585" y="75" class="boxText">Where agentic behaviour and workflow control live</text></g>
    <g transform="translate(0,320)"><rect x="0" y="20" width="70" height="70" rx="12" fill="#0d9488"/><text x="35" y="66" text-anchor="middle" class="num">5</text><rect x="100" y="0" width="380" height="110" rx="14" class="layer"/><text x="130" y="45" class="icon">△</text><text x="190" y="43" class="layerTitle">Model &amp; Learning</text><text x="190" y="75" class="small">Algorithms, models, training and evaluation</text><path d="M480 55 H545" class="arrow"/><rect x="560" y="0" width="450" height="110" rx="14" class="box"/><text x="585" y="40" class="boxText">LLM/SLM • classical ML • CV • tuning • benchmarks</text><text x="585" y="75" class="boxText">The layer for algorithm and model development</text></g>
    <g transform="translate(0,480)"><rect x="0" y="20" width="70" height="70" rx="12" fill="#16a34a"/><text x="35" y="66" text-anchor="middle" class="num">4</text><rect x="100" y="0" width="380" height="110" rx="14" class="layer"/><text x="130" y="45" class="icon">▦</text><text x="190" y="43" class="layerTitle">Data &amp; Knowledge</text><text x="190" y="75" class="small">Sources, pipelines, retrieval and grounding</text><path d="M480 55 H545" class="arrow"/><rect x="560" y="0" width="450" height="110" rx="14" class="box"/><text x="585" y="40" class="boxText">Internal/external data • embeddings • vector databases</text><text x="585" y="75" class="boxText">RAG/KAG, provenance, context and citations</text></g>
    <g transform="translate(0,640)"><rect x="0" y="20" width="70" height="70" rx="12" fill="#65a30d"/><text x="35" y="66" text-anchor="middle" class="num">3</text><rect x="100" y="0" width="380" height="110" rx="14" class="layer"/><text x="130" y="45" class="icon">☁</text><text x="190" y="43" class="layerTitle">Compute Infrastructure</text><text x="190" y="75" class="small">Cloud, on-premise, local and edge runtime</text><path d="M480 55 H545" class="arrow"/><rect x="560" y="0" width="450" height="110" rx="14" class="box"/><text x="585" y="40" class="boxText">Servers • containers • APIs • scaling • monitoring</text><text x="585" y="75" class="boxText">Where the AI system runs and is operated</text></g>
    <g transform="translate(0,800)"><rect x="0" y="20" width="70" height="70" rx="12" fill="#ca8a04"/><text x="35" y="66" text-anchor="middle" class="num">2</text><rect x="100" y="0" width="380" height="110" rx="14" class="layer"/><text x="130" y="45" class="icon">▣</text><text x="190" y="43" class="layerTitle">Chips &amp; Accelerators</text><text x="190" y="75" class="small">GPUs, TPUs, NPUs, CPUs and memory</text><path d="M480 55 H545" class="arrow"/><rect x="560" y="0" width="450" height="110" rx="14" class="box"/><text x="585" y="40" class="boxText">Hardware acceleration, latency and throughput</text><text x="585" y="75" class="boxText">Edge devices, embedded processors and optimisation</text></g>
    <g transform="translate(0,960)"><rect x="0" y="20" width="70" height="70" rx="12" fill="#b45309"/><text x="35" y="66" text-anchor="middle" class="num">1</text><rect x="100" y="0" width="380" height="110" rx="14" class="layer"/><text x="130" y="45" class="icon">⚡</text><text x="190" y="43" class="layerTitle">Physical Foundation</text><text x="190" y="75" class="small">Energy, cooling, hardware and facilities</text><path d="M480 55 H545" class="arrow"/><rect x="560" y="0" width="450" height="110" rx="14" class="box"/><text x="585" y="40" class="boxText">Power • cooling • physical hardware • availability</text><text x="585" y="75" class="boxText">The tangible base of the AI architecture</text></g>
  </g>
  <rect x="100" y="1320" width="1000" height="100" rx="16" class="footer"/>
  <text x="140" y="1360" class="layerTitle">Development factors</text><text x="140" y="1395" class="small">Quality and speed • cost management • safety and governance • sustainability</text>
</svg>