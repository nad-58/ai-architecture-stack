<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="650" viewBox="0 0 1000 650"><style>text{font-family:Arial;fill:#0f172a}.title{font-size:34px;font-weight:700}.h{font-size:22px;font-weight:700}.t{font-size:16px}.b{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.g{fill:#ecfdf5;stroke:#059669;stroke-width:2}.o{fill:#fff7ed;stroke:#f97316;stroke-width:2}.p{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2}</style><rect width="1000" height="650" fill="white"/><text x="500" y="55" text-anchor="middle" class="title">Deployment Trade-off Map</text><rect x="60" y="120" width="200" height="300" rx="14" class="b"/><text x="160" y="160" text-anchor="middle" class="h">Cloud</text><text x="85" y="210" class="t">Scalable</text><text x="85" y="245" class="t">Managed services</text><text x="85" y="280" class="t">Large models</text><text x="85" y="340" class="t">Check cost</text><text x="85" y="375" class="t">Check data policy</text><rect x="290" y="120" width="200" height="300" rx="14" class="g"/><text x="390" y="160" text-anchor="middle" class="h">On-premise</text><text x="315" y="210" class="t">Internal control</text><text x="315" y="245" class="t">Sensitive data</text><text x="315" y="280" class="t">Private systems</text><text x="315" y="340" class="t">Check upkeep</text><text x="315" y="375" class="t">Check expertise</text><rect x="520" y="120" width="200" height="300" rx="14" class="o"/><text x="620" y="160" text-anchor="middle" class="h">Local</text><text x="545" y="210" class="t">Prototype</text><text x="545" y="245" class="t">Education</text><text x="545" y="280" class="t">Small models</text><text x="545" y="340" class="t">Check limits</text><text x="545" y="375" class="t">Check scaling</text><rect x="750" y="120" width="200" height="300" rx="14" class="p"/><text x="850" y="160" text-anchor="middle" class="h">Edge</text><text x="775" y="210" class="t">Low latency</text><text x="775" y="245" class="t">Sensors</text><text x="775" y="280" class="t">Offline use</text><text x="7